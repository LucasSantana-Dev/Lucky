<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280">
<defs>
  <filter id="pinkGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FF57E3" flood-opacity="1"/>
    <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#B34BFF" flood-opacity="0.65"/>
    <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7E2BFF" flood-opacity="0.45"/>
  </filter>
  <filter id="goldGlow" x="-60%" y="-60%" width="220%" height="220%">
