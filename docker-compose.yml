# Shared resource defaults — applied per service via `<<: *small-svc` etc.
x-small-svc: &small-svc
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped

x-medium-svc: &medium-svc
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

x-large-svc: &large-svc
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

# Environment shared by bot + backend. Both apps connect to the same
# postgres, redis, Discord auth pair, Sentry org, and integrations
# (last.fm + spotify). Service-specific vars stay inline in each
# service's `environment:` block.
x-common-app-env: &common-app-env
    NODE_ENV: production
    DISCORD_TOKEN: ${DISCORD_TOKEN}
    CLIENT_ID: ${CLIENT_ID}
    SENTRY_DSN: ${SENTRY_DSN:-}
    SENTRY_ENABLED: ${SENTRY_ENABLED:-true}
    SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    SENTRY_SERVER_NAME: ${SENTRY_SERVER_NAME:-}
    SENTRY_APP_NAME: ${SENTRY_APP_NAME:-lucky}
    SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-}
    SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-}
    DATABASE_URL: postgresql://discordbot:${POSTGRES_PASSWORD?POSTGRES_PASSWORD_required}@postgres:5432/discordbot
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_DB: ${REDIS_DB:-0}
    LASTFM_API_KEY: ${LASTFM_API_KEY:-}
    LASTFM_API_SECRET: ${LASTFM_API_SECRET:-}
    LASTFM_LINK_SECRET: ${LASTFM_LINK_SECRET:-}
    SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
    SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-}
    SPOTIFY_LINK_SECRET: ${SPOTIFY_LINK_SECRET:-}
    WEBAPP_REDIRECT_URI: ${WEBAPP_REDIRECT_URI:-}
    WEBAPP_SESSION_SECRET: ${WEBAPP_SESSION_SECRET:-}
services:
    postgres:
        <<: *large-svc
        image: postgres:18-alpine
        container_name: lucky-postgres
        environment:
            POSTGRES_DB: discordbot
            POSTGRES_USER: discordbot
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?POSTGRES_PASSWORD_required}
            PGDATA: /var/lib/postgresql/data
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - lucky-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U discordbot -d discordbot"]
            interval: 30s
            timeout: 10s
            retries: 3
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    redis:
        <<: *medium-svc
        image: redis:8-alpine
        container_name: lucky-redis
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - lucky-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    bot:
        <<: *large-svc
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/lucky}-bot:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: production-bot
            args:
                SERVICE: bot
                NODE_ENV: production
        container_name: lucky-bot
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            <<: *common-app-env
            SENTRY_SERVICE_NAME: ${SENTRY_SERVICE_NAME:-bot}
            BOT_NAME: ${BOT_NAME:-Lucky}
            LASTFM_SESSION_KEY: ${LASTFM_SESSION_KEY:-}
            PLAYER_CONNECTION_TIMEOUT: ${PLAYER_CONNECTION_TIMEOUT:-15000}
            MUSIC_WATCHDOG_RECOVERY_WAIT_MS: ${MUSIC_WATCHDOG_RECOVERY_WAIT_MS:-5000}
            TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
            TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
            TWITCH_ACCESS_TOKEN: ${TWITCH_ACCESS_TOKEN:-}
            TWITCH_REFRESH_TOKEN: ${TWITCH_REFRESH_TOKEN:-}
            AI_DEV_TOOLKIT_BOARD_ENABLED: ${AI_DEV_TOOLKIT_BOARD_ENABLED:-false}
            AI_DEV_TOOLKIT_CHANNEL_ID: ${AI_DEV_TOOLKIT_CHANNEL_ID:-}
            GITHUB_TOKEN: ${GITHUB_TOKEN:-}
        volumes:
            - ./downloads:/app/downloads
            - ./logs:/app/logs
        networks:
            - lucky-network
            # Shared monitoring network so the homelab Prometheus
            # container can scrape /metrics on port 9091 without
            # exposing it on the host. See homelab PR #135.
            - lucky-monitoring
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    backend:
        <<: *medium-svc
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/lucky}-backend:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: production-backend
            args:
                SERVICE: backend
                NODE_ENV: production
        container_name: lucky-backend
        env_file:
            - .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            <<: *common-app-env
            SENTRY_SERVICE_NAME: ${SENTRY_SERVICE_NAME:-backend}
            LUCKY_NOTIFY_API_KEY: ${LUCKY_NOTIFY_API_KEY:-}
            CLIENT_SECRET: ${CLIENT_SECRET}
            WEBAPP_PORT: 3000
            DEVELOPER_USER_IDS: ${DEVELOPER_USER_IDS:-}
            WEBAPP_FRONTEND_URL: ${WEBAPP_FRONTEND_URL:-}
            WEBAPP_BACKEND_URL: ${WEBAPP_BACKEND_URL:-}
        networks:
            - lucky-network
            # Shared monitoring network so the homelab Prometheus
            # container can scrape /metrics on the backend without
            # exposing it on the host. See homelab PR #135.
            - lucky-monitoring
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    frontend:
        <<: *small-svc
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/lucky}-frontend:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile
            target: production-frontend
        container_name: lucky-frontend
        networks:
            - lucky-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    nginx:
        <<: *small-svc
        image: ${IMAGE_PREFIX:-ghcr.io/lucassantana-dev/lucky}-nginx:${IMAGE_TAG:-latest}
        build:
            context: .
            dockerfile: Dockerfile.nginx
        container_name: lucky-nginx
        depends_on:
            - backend
            - frontend
        ports:
            # Container now listens on 8080 (non-root nginx).
            # NOTE: update cloudflared config-lucky.yml service entry to
            # `http://nginx:8080` after deploying this change.
            - "${NGINX_PORT:-8080}:8080"
        networks:
            - lucky-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    webhook:
        <<: *small-svc
        build:
            context: ./deploy
            dockerfile: Dockerfile
        container_name: lucky-webhook
        command: >
            -hooks /home/luk-server/Lucky/deploy/hooks.json
            -verbose
            -hotreload
        environment:
            - DEPLOY_WEBHOOK_SECRET=${DEPLOY_WEBHOOK_SECRET}
            - DISCORD_DEPLOY_WEBHOOK=${DISCORD_DEPLOY_WEBHOOK:-}
            - DEPLOY_DIR=/home/luk-server/Lucky
        volumes:
            # Read hooks.json from the directory-mounted repo (not a single-file
            # mount): a single-file bind-mount freezes to the original inode, so
            # a deploy's `git reset` that REPLACES the file is never seen, leaving
            # the webhook on a stale hooks.json. The directory mount updates live,
            # so -hotreload picks up changes (e.g. new pass-arguments entries).
            - .:/home/luk-server/Lucky
            - ${CLOUDFLARED_CONFIG_DIR:-/home/luk-server/.cloudflared}:${CLOUDFLARED_CONFIG_DIR:-/home/luk-server/.cloudflared}:ro
            - /var/run/docker.sock:/var/run/docker.sock
        working_dir: /home/luk-server/Lucky
        networks:
            - lucky-network
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    # Cloudflare Tunnel — exposes nginx to lucky.lucassantana.tech
    cloudflared:
        <<: *small-svc
        image: cloudflare/cloudflared:2026.6.0
        container_name: lucky-tunnel
        command: tunnel --config /etc/cloudflared/config-lucky.yml run
        volumes:
            - ${CLOUDFLARED_CONFIG_DIR:-/home/luk-server/.cloudflared}:/etc/cloudflared:ro
        depends_on:
            - nginx
        networks:
            - lucky-network
        profiles:
            - tunnel
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

volumes:
    postgres_data:
    redis_data:

networks:
    lucky-network:
        driver: bridge
    # External network shared with the homelab monitoring stack
    # (Prometheus, Grafana). Lucky owns/creates it; homelab joins it
    # as `external: true`. See homelab PR #135.
    lucky-monitoring:
        name: lucky-monitoring
        driver: bridge
