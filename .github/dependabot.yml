version: 2
updates:
    # NOTE: YouTube dependency groups (discord-player-youtubei, etc.) are gated by
    # the test-youtube-smoke CI job (see .github/workflows/ci.yml). Review smoke test
    # results before merging PRs affecting these packages.
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      groups:
          dev-patches:
              dependency-type: 'development'
              update-types: ['patch', 'minor']
          dev-majors:
              dependency-type: 'development'
              update-types: ['major']
          production-patches:
              dependency-type: 'production'
              update-types: ['patch', 'minor']
          production-majors:
              dependency-type: 'production'
              update-types: ['major']
    - package-ecosystem: 'docker'
      directory: '/'
      schedule:
          interval: 'weekly'

    - package-ecosystem: 'docker'
      directory: '/deploy'
      schedule:
          interval: 'monthly'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
