name: Path Portability

on:
  pull_request:
  push:
    branches: [main, 'release/**']
  merge_group:
    branches: [main, 'release/**']

permissions:
  contents: read

jobs:
  portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install jq and ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep
      - name: Run path portability guard
        run: |
          bash scripts/check-path-portability.sh
          bash scripts/check-path-portability.sh --json | jq -e '.status == "ok" and .issueCount == 0'
