name: Quality Gates

on:
    push:
        branches: ['release/**', main]
    pull_request:
        branches: ['release/**', main]

jobs:
    quality:
        uses: LucasSantana-Dev/.github/.github/workflows/quality.yml@aae80785af816b7dde59e50f66855be65d120685
        with:
            node-version: '24'
            has-dockerfile: true
            run-deadcode: true
            package-manager: npm
            pre-lint-script: 'npm run db:generate && npm run build:shared'
        permissions:
            contents: read
            security-events: write
            actions: read
