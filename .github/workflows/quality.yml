name: Quality Gates

on:
    push:
        branches: ['release/**', main]
    pull_request:
        branches: ['release/**', main]

jobs:
    quality:
        uses: LucasSantana-Dev/.github/.github/workflows/quality.yml@main
        with:
            node-version: '22'
            has-dockerfile: true
            run-deadcode: true
            package-manager: npm
        permissions:
            contents: read
            security-events: write
            actions: read
