name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/frontend/**'
      - 'packages/shared/**'
      - 'prisma/**'
      - 'CHANGELOG.md'
      - '.github/workflows/deploy-frontend-cf.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This is a root-lockfile monorepo (workspaces: packages/*). Per-package
      # lockfiles are gitignored (.gitignore: packages/*/package-lock.json), so
      # `npm ci` and the setup-node cache MUST target the root package-lock.json.
      # The old config pointed both at packages/frontend/package-lock.json, which
      # does not exist in CI — every run died at the cache step in ~8s and the
      # live site froze on a pre-workflow build. Mirror the Dockerfile `build` +
      # `build-frontend` stages: root install → prisma generate → build:shared →
      # frontend build (which imports @lucky/shared and repo-root CHANGELOG.md).
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build shared package
        run: npm run build:shared

      - name: Build frontend
        run: npm run build --workspace=packages/frontend
        env:
          VITE_API_BASE_URL: https://lucky-api.lucassantana.tech/api
          VITE_SENTRY_ENVIRONMENT: production
          VITE_COMMIT_SHA: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 712118840109d834d5e99925fd172432
          command: pages deploy packages/frontend/dist --project-name lucky-webapp --branch main
