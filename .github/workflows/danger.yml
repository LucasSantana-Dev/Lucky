name: Danger

# Deterministic PR rules — runs in CI, comments on PRs.
# Never blocks merge; only fails when something is unambiguously wrong
# (lockfile drift, .env files, etc.). For "soft" warnings see dangerfile.ts.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  danger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Danger
        run: npm install --no-save danger@^12

      - name: Run Danger
        run: npx danger ci --failOnErrors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
