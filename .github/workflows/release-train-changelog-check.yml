name: Release-train CHANGELOG check

on:
  pull_request:
    branches: [main]
    paths: ['CHANGELOG.md']

permissions:
  contents: read

jobs:
  check:
    # Only run for release-train PRs (head branch matches chore/release-v*)
    if: startsWith(github.head_ref, 'chore/release-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify [Unreleased] is empty after promotion
        run: |
          # Release-train PRs MUST promote [Unreleased] to a versioned section.
          # If [Unreleased] still has content, the PR is malformed.
          section=$(awk '/^## \[Unreleased\]/{flag=1;next} /^## \[/{flag=0} flag' CHANGELOG.md | sed '/^$/d')
          if [ -n "$section" ]; then
            echo "::error::Release-train PR but [Unreleased] still has content:"
            echo "$section"
            exit 1
          fi
          echo "[Unreleased] is correctly empty"

      - name: Verify new version section has content
        run: |
          # Find the most recent [X.Y.Z] section and confirm it's non-empty
          content=$(awk '/^## \[[0-9]/{if(found){exit}; found=1; next} found{print}' CHANGELOG.md | sed '/^$/d')
          if [ -z "$content" ]; then
            echo "::error::Most recent versioned section is empty"
            exit 1
          fi
          echo "Most recent versioned section has content"
