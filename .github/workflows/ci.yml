name: CI/CD Pipeline

on:
    push:
        branches: [main, 'release/**']
    pull_request:
        branches: [main, 'release/**']
    merge_group:
        branches: [main, 'release/**']

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build-shared:
        name: Build — shared
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Generate Prisma client
              run: npx prisma generate
            - name: Build shared package
              run: npm run build:shared
            - name: Upload shared artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: shared-build
                  path: |
                      packages/shared/src/generated/prisma
                      packages/shared/dist
                  retention-days: 1

    checks:
        name: Checks
        runs-on: ubuntu-latest
        needs: build-shared
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Download shared artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: shared-build
                  path: packages/shared
            - name: Lint
              run: |
                  npm run lint --workspace=packages/frontend
                  npm run lint --workspace=packages/backend
                  npm run lint --workspace=packages/bot
                  npm run lint --workspace=packages/shared
            - name: Verify shared package exports
              run: npm run verify:shared-exports
              env:
                  DATABASE_URL: postgresql://localhost:5432/test
            - name: Type check
              run: npm run type:check
            - name: Check documentation coverage
              run: npm run docs:check --workspace=packages/shared
            - name: Build project
              run: npm run build

    test-shared:
        name: Test — shared
        runs-on: ubuntu-latest
        needs: build-shared
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Download shared artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: shared-build
                  path: packages/shared
            - name: Run shared tests
              run: npm run test --workspace=packages/shared -- --ci --coverage
              env:
                  # Some shared service modules eagerly init Prisma at import time (#1249)
                  DATABASE_URL: postgresql://localhost:5432/test

    test-backend:
        name: Test — backend
        runs-on: ubuntu-latest
        needs: build-shared
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Download shared artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: shared-build
                  path: packages/shared
            - name: Run backend tests
              run: npm run test --workspace=packages/backend -- --ci --coverage
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: coverage-backend
                  path: packages/backend/coverage/lcov.info
                  retention-days: 1

    test-bot:
        name: Test — bot
        runs-on: ubuntu-latest
        needs: build-shared
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Download shared artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: shared-build
                  path: packages/shared
            - name: Run bot tests
              run: npm run test --workspace=packages/bot -- --ci --coverage
            - name: Run music incident regression
              run: npm run test:music:incident
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: coverage-bot
                  path: packages/bot/coverage/lcov.info
                  retention-days: 1

    test-youtube-smoke:
        name: Test — YouTube smoke (dependency guard)
        runs-on: ubuntu-latest
        needs: build-shared
        # Only runs on dependabot/renovate pull_request events touching YouTube packages.
        if: |
          (github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]') && (
            contains(github.event.pull_request.title, 'youtubei.js') ||
            contains(github.event.pull_request.title, 'discord-player-youtubei') ||
            contains(github.event.pull_request.title, 'yt-dlp') ||
            contains(github.event.pull_request.title, 'youtube-dl-exec') ||
            contains(github.event.pull_request.title, 'play-dl')
          )
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Download shared artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: shared-build
                  path: packages/shared
            - name: Run YouTube smoke test
              run: YOUTUBE_SMOKE_TEST=true npm run test --workspace=packages/bot -- --testPathPatterns="youtube.smoke" --ci --coverage
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: coverage-bot-youtube-smoke
                  path: packages/bot/coverage/lcov.info
                  retention-days: 1

    test-frontend:
        name: Test — frontend
        runs-on: ubuntu-latest
        needs: build-shared
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Download shared artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: shared-build
                  path: packages/shared
            - name: Run frontend tests
              run: npm run test --workspace=packages/frontend -- --coverage --coverage.reporter=lcov --coverage.reporter=text
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: coverage-frontend
                  path: packages/frontend/coverage/lcov.info
                  retention-days: 1

    detect-docker-changes:
        name: Detect Docker-relevant changes
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        outputs:
            relevant: ${{ steps.filter.outputs.relevant }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0
            - name: Check for Docker-relevant changes
              id: filter
              run: |
                  BASE_SHA="${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}"
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                      # pull_request.base.sha is a snapshot from when the PR was
                      # opened/synced, not the live base branch tip — diffing
                      # against it directly can pick up unrelated commits merged
                      # to base after that point. Use the actual merge-base.
                      BASE_SHA=$(git merge-base "$BASE_SHA" HEAD)
                  fi
                  CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
                  echo "Changed files:"
                  echo "$CHANGED"
                  # Mirrors docker-publish.yml's paths: filter, plus this
                  # workflow file itself (so edits to the docker-build job
                  # definition are still validated).
                  if echo "$CHANGED" | grep -qE '^(packages/|prisma/|Dockerfile$|Dockerfile\.|nginx/|package.*\.json$|\.github/workflows/ci\.yml$)'; then
                      echo "relevant=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "relevant=false" >> "$GITHUB_OUTPUT"
                  fi

    docker-build:
        name: Build — ${{ matrix.service }}
        runs-on: ubuntu-latest
        needs: detect-docker-changes
        if: (github.event_name == 'pull_request' || github.event_name == 'merge_group') && needs.detect-docker-changes.outputs.relevant == 'true'
        concurrency:
            group: docker-build-${{ github.ref }}
            cancel-in-progress: true
        strategy:
            fail-fast: false
            matrix:
                include:
                    - {service: bot, file: Dockerfile, target: production-bot}
                    - {service: backend, file: Dockerfile, target: production-backend}
                    - {service: frontend, file: Dockerfile, target: production-frontend}
                    - {service: nginx, file: Dockerfile.nginx, target: ''}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
            - name: Set up Docker Buildx
              id: buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
              continue-on-error: true
            - name: Set up Docker Buildx — retry once on transient failure
              if: steps.buildx.outcome == 'failure'
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
            - name: Build ${{ matrix.service }}
              id: build
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
              continue-on-error: true
              with:
                  context: .
                  file: ${{ matrix.file }}
                  target: ${{ matrix.target }}
                  push: false
                  load: false
                  provenance: false
                  sbom: false
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}
                  build-args: |
                      COMMIT_SHA=${{ github.sha }}
                      NPM_CACHE_KEY=${{ hashFiles('package-lock.json') }}
            - name: Build ${{ matrix.service }} — retry once on transient failure
              if: steps.build.outcome == 'failure'
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
              with:
                  context: .
                  file: ${{ matrix.file }}
                  target: ${{ matrix.target }}
                  push: false
                  load: false
                  provenance: false
                  sbom: false
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.service }}
                  build-args: |
                      COMMIT_SHA=${{ github.sha }}
                      NPM_CACHE_KEY=${{ hashFiles('package-lock.json') }}

    docker-build-check:
        name: Build — Docker images
        runs-on: ubuntu-latest
        needs: [detect-docker-changes, docker-build]
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
        steps:
            - name: Assert all builds passed
              run: |
                  if [[ "${{ needs.detect-docker-changes.result }}" != "success" ]]; then
                      echo "Detect-docker-changes did not complete successfully: ${{ needs.detect-docker-changes.result }}"
                      exit 1
                  fi
                  if [[ "${{ needs.detect-docker-changes.outputs.relevant }}" != "true" ]]; then
                      echo "No Docker-relevant changes in this diff — skipping validation."
                      exit 0
                  fi
                  if [[ "${{ needs.docker-build.result }}" != "success" ]]; then
                      echo "Docker build result: ${{ needs.docker-build.result }}"
                      exit 1
                  fi

    quality-gate:
        # test-youtube-smoke intentionally excluded: advisory-only, runs on YouTube dependency PRs only
        name: Quality Gates
        runs-on: ubuntu-latest
        needs: [build-shared, checks, test-shared, test-backend, test-bot, test-frontend]
        if: always()
        steps:
            - name: Assert all jobs passed
              run: |
                  checks="${{ needs.checks.result }}"
                  shared="${{ needs.test-shared.result }}"
                  backend="${{ needs.test-backend.result }}"
                  bot="${{ needs.test-bot.result }}"
                  frontend="${{ needs.test-frontend.result }}"
                  if [[ "$checks" != "success" || "$shared" != "success" || "$backend" != "success" || "$bot" != "success" || "$frontend" != "success" ]]; then
                      echo "Job results: checks=$checks  test-shared=$shared  test-backend=$backend  test-bot=$bot  test-frontend=$frontend"
                      exit 1
                  fi

    sonar:
        name: SonarCloud Scan
        runs-on: ubuntu-latest
        needs: [test-backend, test-bot, test-frontend]
        permissions:
            contents: read
            pull-requests: read
        env:
            SONAR_TOKEN_PRESENT: ${{ secrets.SONAR_TOKEN != '' }}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: coverage-backend
                  path: packages/backend/coverage
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: coverage-bot
                  path: packages/bot/coverage
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: coverage-frontend
                  path: packages/frontend/coverage
            - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
              with:
                  distribution: temurin
                  java-version: '17'
            - name: Validate Sonar token policy
              if: env.SONAR_TOKEN_PRESENT != 'true' && github.actor != 'dependabot[bot]'
              run: |
                  echo "::error::SONAR_TOKEN is required for non-Dependabot runs."
                  exit 1
            - name: Skip Sonar scan for Dependabot without token
              if: env.SONAR_TOKEN_PRESENT != 'true' && github.actor == 'dependabot[bot]'
              run: echo "Skipping SonarCloud scan — no token for Dependabot."
            # First attempt is allowed to fail: the scanner-engine download from
            # scanner.sonarcloud.io intermittently 403s (transient CDN/provisioning),
            # which otherwise fails this required check and blocks merge on a flake.
            - name: SonarCloud Scan (PR — quality gate blocks merge)
              id: sonar_pr
              if: env.SONAR_TOKEN_PRESENT == 'true' && github.event_name == 'pull_request'
              continue-on-error: true
              uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
              with:
                  args: -Dsonar.qualitygate.wait=true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            # Retry once only when the first attempt failed. A real quality-gate
            # failure fails both attempts (so merge stays blocked); a transient
            # download 403 clears on the retry.
            - name: SonarCloud Scan (PR) — retry once on transient failure
              if: env.SONAR_TOKEN_PRESENT == 'true' && github.event_name == 'pull_request' && steps.sonar_pr.outcome == 'failure'
              uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
              with:
                  args: -Dsonar.qualitygate.wait=true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            # Push-to-main scan is informational only — its failure must never fail
            # the job (and thereby block the build→deploy chain). continue-on-error
            # makes "non-blocking" actually true.
            - name: SonarCloud Scan (main — informational, non-blocking)
              if: env.SONAR_TOKEN_PRESENT == 'true' && github.event_name == 'push'
              continue-on-error: true
              uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
              with:
                  args: -Dsonar.qualitygate.wait=false
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    security:
        name: Security
        runs-on: ubuntu-latest
        concurrency:
            group: ${{ github.workflow }}-security-${{ github.ref }}
            cancel-in-progress: true
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '24'
                  cache: 'npm'
            - run: npm ci --legacy-peer-deps --ignore-scripts
            - name: Security audit
              run: npm run audit:high
            - name: Secrets scan
              run: npx secretlint "**/*"
            - name: TruffleHog secret scan
              uses: trufflesecurity/trufflehog@0ec3634f6cf66a61912a923fee9d20cc45633a67  # post-v3.95.2 (2026-05-07)
              with:
                  extra_args: --only-verified
              continue-on-error: true
            - name: Socket.dev supply chain scan
              run: echo "Socket.dev scan -- GitHub App (apps/socket-security) covers PR-level blocking"
              # SocketDev/socket-security-action@v1 is unavailable; removed to unblock CI
