name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    quality-gates:
        name: Quality Gates
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps --ignore-scripts

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Lint code
              run: |
                  npm run lint --workspace=packages/frontend
                  npm run lint --workspace=packages/backend

            - name: Build shared package
              run: npm run build:shared

            - name: Verify shared package exports
              run: npm run verify:shared-exports

            - name: Type check
              run: npm run type:check

            - name: Build project
              run: npm run build

            - name: Run backend tests with coverage
              run: npm run test:ci -- --coverage

            - name: Run bot tests with coverage
              run: npm run test --workspace=packages/bot -- --ci --coverage

            - name: Run music incident regression suite
              run: npm run test:music:incident

            - name: Run frontend tests with coverage
              run: npm run test --workspace=packages/frontend -- --coverage --coverage.reporter=lcov --coverage.reporter=text

            - name: Upload coverage artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-reports
                  path: |
                      packages/backend/coverage/lcov.info
                      packages/bot/coverage/lcov.info
                      packages/frontend/coverage/lcov.info
                  retention-days: 1

    security:
        name: Security
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps --ignore-scripts

            - name: Security audit
              run: npm run audit:high

            - name: Secrets scan
              run: npx secretlint "**/*"

            - name: TruffleHog secret scan
              uses: trufflesecurity/trufflehog@main
              with:
                  extra_args: --only-verified
              continue-on-error: true
