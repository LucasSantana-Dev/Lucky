name: CI/CD Pipeline

on:
    push:
        branches: [main, 'release/**']
    pull_request:
        branches: [main, 'release/**']

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    quality-gates:
        name: Quality Gates
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps --ignore-scripts

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Lint code
              run: |
                  npm run lint --workspace=packages/frontend
                  npm run lint --workspace=packages/backend

            - name: Build shared package
              run: npm run build:shared

            - name: Verify shared package exports
              run: npm run verify:shared-exports

            - name: Type check
              run: npm run type:check

            - name: Build project
              run: npm run build

            - name: Run backend tests
              run: npm run test:ci

            - name: Run bot tests
              run: npm run test --workspace=packages/bot -- --ci

            - name: Run music incident regression suite
              run: npm run test:music:incident

            - name: Run frontend tests
              run: npm run test --workspace=packages/frontend

    security:
        name: Security
        runs-on: ubuntu-latest
        concurrency:
            group: ${{ github.workflow }}-security-${{ github.ref }}
            cancel-in-progress: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps --ignore-scripts

            - name: Security audit
              run: npm run audit:high

            - name: Secrets scan
              run: npx secretlint "**/*"

            - name: TruffleHog secret scan
              uses: trufflesecurity/trufflehog@0fa069c12f0c7baf431041cd1e564a9c5058846c  # post-v3.95.2 (2026-05-07)
              with:
                  extra_args: --only-verified
              continue-on-error: true

            - name: Socket.dev supply chain scan
              run: echo "Socket.dev scan -- GitHub App (apps/socket-security) covers PR-level blocking"
              # SocketDev/socket-security-action@v1 is unavailable; removed to unblock CI
