name: Circular Deps (madge)

on:
    push:
        branches: ['release/**', main]
    pull_request:
        branches: ['release/**', main]
    merge_group:
        branches: ['release/**', main]

# Hard gate. Blocks merges if cycle count exceeds baseline.
# Baseline: COUNT > 1 (permits 1 known residual type-only cycle).
#
# 1 known residual: types/CustomClient.ts > models/Command.ts > types/CommandData.ts
# All imports in this cycle are `import type`; breaking it requires structural
# refactoring (moving types to shared file) that cascades into command-loader
# consumers (help.ts). Deferred pending command-loader contract review.
#
# See decisions/2026-05-16-next-refactor-target-bot-circular-deps.md.

permissions:
    contents: read

jobs:
    circular:
        name: madge / packages/bot
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: '22'

            - name: Install madge
              # --ignore-scripts: this static-analysis job needs only the source
              # tree, not any postinstall binaries. Without it, the full install
              # runs youtube-dl-exec's postinstall, which fetches the yt-dlp
              # binary from GitHub releases unauthenticated and flakes on the
              # ~60/hr anonymous rate limit (blocked #1105). Matches the
              # --ignore-scripts convention already used throughout ci.yml.
              run: npm install --no-save madge@^7 --ignore-scripts

            - name: Run madge --circular on packages/bot/src
              run: |
                  npx madge --circular --extensions ts packages/bot/src \
                      | tee madge-bot.txt
                  COUNT=$(grep -cE '^[0-9]+\)' madge-bot.txt || echo 0)
                  echo "bot_cycles=$COUNT" >> "$GITHUB_OUTPUT"
                  {
                      echo "## madge circular deps — packages/bot/src"
                      echo ""
                      echo "**Cycle count:** $COUNT (max: 1)"
                      echo ""
                      echo '```'
                      cat madge-bot.txt
                      echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
                  if [ "$COUNT" -gt 1 ]; then
                      echo "❌ Cycle count exceeds baseline (> 1)" >&2
                      exit 1
                  fi
              id: madge

            - name: Upload madge report
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: madge-report
                  path: madge-bot.txt
                  retention-days: 14
