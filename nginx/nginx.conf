resolver 127.0.0.11 valid=10s ipv6=off;

# Include blue/green upstream config (rewritten by scripts/bluegreen-flip.sh).
include upstream-active.conf;

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    "~*https" https;
    "~*http" http;
    default https;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 50M;

    # Security headers (decisions/2026-06-11-security-headers-placement.md).
    # TLS terminates at the Cloudflare Tunnel; HSTS is set there, NOT here —
    # browsers ignore Strict-Transport-Security received over plain http.
    # /api gets its headers from helmet in the backend, so this block is
    # declared per-location below. NOTE: add_header in a location REPLACES
    # all inherited add_header directives — never rely on server-level
    # inheritance once a location sets its own.

    location /webhook/ {
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        set $webhook_upstream http://webhook:9000;
        rewrite ^/webhook/(.*)$ /hooks/$1 break;
        proxy_pass $webhook_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 300s;
    }

    location /api {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://cdn.discordapp.com https://cdn.discord.com; connect-src 'self' https://lucky-api.lucassantana.tech https://api.luk-homeserver.com.br https://*.sentry.io; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri /api/security/csp-report" always;

        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }
}
