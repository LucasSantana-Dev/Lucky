# CodeRabbit configuration — Lucky
# Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# Goal: stop nit-spam from blocking the merge gate. Keep substantive
# bug-finding active. Per workflow.md merge rule: tools should approve
# when there's no real concern, not when there's no comment at all.
language: en-US

reviews:
  # 'chill' = minor/nit comments are summarized rather than posted as
  # actionable threads that flip the PR to CHANGES_REQUESTED.
  profile: chill
  # Never auto-block merges on style / opinion. The merge rule already
  # gates on substantive concerns, not bot mood.
  request_changes_workflow: false
  # Keep the high-level summary so reviewers see a TL;DR.
  high_level_summary: true
  # No poems — they're noise in the comment timeline.
  poem: false
  # Don't post the per-file walkthrough as a separate review status.
  review_status: false
  # Collapse the walkthrough so it's clickable but not screen-eating.
  collapse_walkthrough: true
  # Skip auto-review on these paths — they're either generated or
  # policy artifacts where bot opinions don't add value.
  path_filters:
    - '!**/*.lock'
    - '!**/package-lock.json'
    - '!**/dist/**'
    - '!**/build/**'
    - '!**/.next/**'
    - '!**/generated/**'
    - '!**/__generated__/**'
    - '!**/CHANGELOG.md'
    - '!**/*.snap'

  auto_review:
    enabled: true
    # Don't review on draft PRs — saves rate-limit budget.
    drafts: false
    # Run on these base branches; release/** and main only.
    base_branches:
      - main
      - 'release/.*'

chat:
  # Don't auto-reply to comments — keeps the thread quiet.
  auto_reply: false

# Knowledge-base sources CodeRabbit reads for context.
knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
